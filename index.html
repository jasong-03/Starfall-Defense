<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfall Defense</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" crossorigin>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="crt-container">
        <div class="crt-bezel">
            <div class="crt-screen">
                <canvas id="gameCanvas" width="700" height="500"></canvas>
                <div class="scanlines"></div>
            </div>
            <div class="crt-screen-border"></div>
            <div class="ticker-bar">
                <span class="ticker-text">TELLOR PRICE TRB/USD $15.58 &nbsp;|&nbsp; ETH/USD $2054 &nbsp;|&nbsp; BTC/USD $68803</span>
            </div>
        </div>
        <div class="crt-base">
            <div class="crt-base-detail"></div>
        </div>
    </div>

    <script type="module" src="js/effects.js"></script>
    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/poseidon2.js"></script>
    <script type="module" src="js/zk-prover.js"></script>
    <script type="module" src="js/stellar-wallet.js"></script>

</body>
</html>
